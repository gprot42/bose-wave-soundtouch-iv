<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link href="%sveltekit.assets%/favicon.ico" rel="icon" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <meta content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  %sveltekit.head%
  <title>SoundTouch Controller</title>
</head>
<body>
<div style="display: contents">%sveltekit.body%</div>

<script>
  const theme = new URL(window.location).searchParams.get('theme');

  document.documentElement.classList.remove('light', 'dark');
  document.documentElement.classList.add(theme || 'dark');
</script>
</body>
</html>
